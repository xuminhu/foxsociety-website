<style>
.hero {

    display: flex;
    align-items: center;
    background: linear-gradient(135deg, #f5f0e8 0%, #e8dfd1 100%);
    padding-top: 72px;
}
.hero-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
}
.hero-content h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 3.5rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: #1a1a1a;
}
.hero-content h1 span {
    color: #d4a574;
}
.hero-subtitle {
    font-size: 1.3rem;
    color: #666;
    margin-bottom: 2rem;
}
.hero-description {
    font-size: 1.1rem;
    margin-bottom: 2.5rem;
    color: #333;
    line-height: 1.8;
}
.hero-buttons {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 3rem;
}
.btn-primary {
    padding: 1rem 2rem;
    background: #1a1a1a;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    font-weight: 600;
}
.btn-secondary {

    border: 2px solid #1a1a1a;

    border-radius: 4px;
    font-weight: 600;
}

}

    font-size: 0.95rem;
}
.hero-visual {

.logo-main {

}
.brand-text {
    text-align: center;
}
.brand-text .cn {

}

    font-size: 18px;
    color: #d4a574;
    letter-spacing: 2px;

.since {

    padding: 8px 20px;
    background: #d4a574;
    border-radius: 20px;
    color: white;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
}
