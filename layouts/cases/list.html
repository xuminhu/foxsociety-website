{{ define "styles" }}
<style>
.cases-hero {
    padding: 120px 2rem 4rem;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    color: white;
    text-align: center;
}
.cases-hero h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 2.5rem;
    margin-bottom: 1rem;
}
.cases-grid {
    max-width: 1200px;
    margin: 4rem auto;
    padding: 0 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 2rem;
}
.case-card {
    background: #faf8f5;
    border-radius: 12px;
    padding: 2rem;
    border: 1px solid rgba(0,0,0,0.05);
    transition: all 0.3s;
    text-decoration: none;
    color: inherit;
    display: block;
}
.case-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
}
.case-direction {
    display: inline-block;
    background: #d4a574;
    color: white;
    padding: 0.3rem 0.8rem;
    border-radius: 4px;
    font-size: 0.85rem;
    margin-bottom: 1rem;
}
.case-name {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: #1a1a1a;
}
.case-schools {
    color: #666;
    font-size: 0.9rem;
    line-height: 1.6;
}
.case-schools strong {
    color: #d4a574;
}
.view-detail {
    margin-top: 1.5rem;
    color: #d4a574;
    font-weight: 500;
}
</style>
{{ end }}

{{ define "main" }}
<section class="cases-hero">
    <h1>成功案例</h1>
    <p>每一份录取背后，都是独特的成长故事</p>
</section>

<section class="cases-grid">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="case-card">
        <span class="case-direction">{{ .Params.direction }}</span>
        <h3 class="case-name">{{ .Params.student_name }}</h3>
        <div class="case-schools">
            <strong>录取院校：</strong><br>
            {{ range $index, $school := .Params.schools }}
                {{ if $index }}、{{ end }}{{ $school }}
            {{ end }}
        </div>
        <div class="view-detail">查看详情 →</div>
    </a>
    {{ end }}
</section>
{{ end }}
