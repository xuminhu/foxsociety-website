{{ define "styles" }}
<style>
.contact-hero {
    padding: 120px 2rem 4rem;
    background: linear-gradient(135deg, #f8f5f0 0%, #e8e0d5 100%);
    text-align: center;
}
.contact-hero h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 2.5rem;
    margin-bottom: 1rem;
}
.contact-card {
    max-width: 500px;
    margin: 4rem auto;
    padding: 3rem;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    text-align: center;
}
.contact-item {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 1.5rem;
    text-align: left;
}
.contact-item .icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, #d4a574, #b8925f);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}
.qr-code {
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(0,0,0,0.08);
}
.qr-code img {
    width: 180px;
    border-radius: 12px;
}
</style>
{{ end }}

{{ define "main" }}
<section class="contact-hero">
    <h1>联系我们</h1>
    <p>开始您的升学规划之旅</p>
</section>

<section class="contact-card">
    <div class="contact-item">
        <div class="icon">📍</div>
        <div>
            <div style="font-size: 13px; color: #666;">地址</div>
            <div style="font-size: 18px; font-weight: 600;">上海市长宁区</div>
        </div>
    </div>
    <div class="contact-item">
        <div class="icon">💬</div>
        <div>
            <div style="font-size: 13px; color: #666;">微信</div>
            <div style="font-size: 18px; font-weight: 600;">foxsociety00133</div>
        </div>
    </div>
    <div class="qr-code">
        <img src="/images/wechat-qr.png" alt="微信二维码">
        <p style="margin-top: 15px; color: #666;">扫码添加微信咨询</p>
    </div>
</section>
{{ end }}
